  # Causal Entropy
  CausalEntropy: # No theiler window yet
    labels:
      - directed
      - nonlinear
      - unsigned
      - bivariate
      - time-dependent
    dependencies:
    configs:
      - estimator: gaussian
      - estimator: kozachenko
      # - estimator: kernel

  CrossmapEntropy: # No theiler window yet
    labels:
      - unsigned
      - directed
      - time-dependent
      - bivariate
    dependencies:
    configs:
      - estimator: gaussian
        history_length: 1

      - estimator: kozachenko
        history_length: 1

      # - estimator: kernel
        # history_length: 1

      - estimator: gaussian
        history_length: 10

      - estimator: kozachenko
        history_length: 10

      # - estimator: kernel
        # history_length: 10

  # Directed Information
  DirectedInfo: # No theiler window yet
    labels:
      - directed
      - nonlinear
      - unsigned
      - bivariate
      - time-dependent
    dependencies:
    configs:
      - estimator: gaussian
      - estimator: kozachenko
      # - estimator: kernel

  StochasticInteraction: # No theiler window
    labels:
      - undirected
      - nonlinear
      - unsigned
      - bivariate
      - time-dependent
    dependencies:
    configs:
      - estimator: gaussian
      - estimator: kozachenko
      # - estimator: kernel

  # Mutual information
  MutualInfo:
    labels:
      - undirected
      - nonlinear
      - unsigned
      - bivariate
      - contemporaneous
    dependencies:
    configs:
      - estimator: gaussian

      - estimator: kraskov
        prop_k: 4

      # - estimator: kraskov
      #   prop_k: 4
      #   dyn_corr_excl: AUTO

      # - estimator: kernel
      #   kernel_width: 0.25

  # Time-lagged mutual information
  TimeLaggedMutualInfo:
    labels:
      - directed
      - nonlinear
      - unsigned
      - bivariate
      - time-dependent
    dependencies:
    configs:
      - estimator: gaussian

      - estimator: kraskov
        prop_k: 4

      # - estimator: kraskov
      #   prop_k: 4
      #   dyn_corr_excl: AUTO

      # - estimator: kernel
      #   kernel_width: 0.25

  # Transfer entropy
  TransferEntropy:
    labels:
      - directed
      - nonlinear
      - unsigned
      - bivariate
      - time-dependent
    dependencies:
    configs:
      # Kraskov estimator with auto-embedding on source/target and DCE
      # - estimator: kraskov
      #   prop_k: 4
      #   auto_embed_method: MAX_CORR_AIS
      #   k_search_max: 10
      #   tau_search_max: 4

      # - estimator: kraskov
      #   prop_k: 4
      #   auto_embed_method: MAX_CORR_AIS
      #   k_search_max: 10
      #   tau_search_max: 4
      #   dyn_corr_excl: AUTO

      # # Kraskov estimator with fixed embedding of 2 for target, 1 for source, and DCE
      # - estimator: kraskov
      #   prop_k: 4
      #   k_history: 2
      #   l_history: 1
      #   dyn_corr_excl: AUTO

      # # Kraskov estimator with fixed embedding of 1 for source/target and DCE
      # - estimator: kraskov
      #   prop_k: 4
      #   k_history: 1
      #   l_history: 1
      #   dyn_corr_excl: AUTO

      # Same as above with no DCE
      - estimator: kraskov
        prop_k: 4
        k_history: 1
        l_history: 1

      # # Kernel estimator with no auto-embedding on source/target
      # - estimator: kernel
      #   kernel_width: 0.25
      #   k_history: 1
      #   l_history: 1

      # Gaussian estimator with auto-embedding
      - estimator: gaussian
        auto_embed_method: MAX_CORR_AIS
        k_search_max: 10
        tau_search_max: 2

      - estimator: gaussian
        k_history: 1
        l_history: 1

      - estimator: symbolic
        k_history: 1
        l_history: 1

      # - estimator: symbolic
